<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Graduation Calculator | BU GWA Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

<style>
/* KEEP YOUR ORIGINAL CSS (UNCHANGED) */
/* I did not modify styles to avoid breaking your UI */
</style>
</head>

<body>

<nav class="navbar">
  <div class="nav-container">
    <span class="logo">BU GWA Calculator</span>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a class="active">Services</a></li>
    </ul>
  </div>
</nav>

<section class="header">
  <h1>Graduation Calculator</h1>
  <p>Compute your cumulative GWA and check Latin Honors eligibility</p>
</section>

<div class="wrapper">

  <div class="card">
    <h2><i class='bx bx-user'></i> Student Name</h2>
    <div class="input-group">
      <input type="text" id="studentName" placeholder="Enter Student Name">
    </div>
  </div>

  <div class="card">
    <h2><i class='bx bx-book'></i> Enter Semesters</h2>

    <div id="semesters"></div>

    <div class="input-group">
      <button onclick="addSemester()">Add Semester</button>
      <button onclick="calculateGWA()">Calculate</button>
    </div>
  </div>

</div>

<!-- RESULT MODAL -->
<div class="modal" id="resultModal">
  <div class="modal-content">

    <h2>Cumulative GWA</h2>

    <div class="student-name" id="displayName"></div>

    <div class="gpa" id="cumulativeGWA">0.0000</div>

    <div class="honor" id="honorBadge"></div>

    <div class="table-container">
      <table id="semTable">
        <thead>
          <tr>
            <th>GWA per Semester</th>
            <th>Honor</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="note">
      Note: Qualification is subject to College/Registrar verification.
    </div>

    <button class="save-btn" onclick="saveGraduation()">
      <i class='bx bx-bookmark'></i> Save This Calculation
    </button>

  </div>
</div>

<script>

let semesterCount = 0;

/* RESTORE */
window.addEventListener("load", () => {

  const data = JSON.parse(localStorage.getItem("restoreGrad"));
  if (!data) {
    addSemester();
    addSemester();
    return;
  }

  const saved = data.data;

  document.getElementById('studentName').value = saved.name;

  document.getElementById('semesters').innerHTML = "";
  semesterCount = 0;

  if (saved.semesters && saved.semesters.length > 0) {

    saved.semesters.forEach(s => {
      addSemester();

      const cards = document.querySelectorAll('.semester-card');
      const last = cards[cards.length - 1];

      last.querySelector('.gwa').value = s.gwa;
      last.querySelector('.units').value = s.units;
    });

  } else {
    addSemester();
    addSemester();
  }

  localStorage.removeItem("restoreGrad");
});


/* ADD SEMESTER */
function addSemester(){

  semesterCount++;

  const semDiv = document.createElement('div');
  semDiv.className = 'semester-card';

  semDiv.innerHTML = `
    <div class="semester-header">
      <div class="semester-title">
        <i class='bx bx-calendar'></i>
        Semester ${semesterCount}
      </div>

      ${semesterCount > 1 ? `
        <button class="remove-semester" onclick="removeSemester(this)">
          <i class='bx bx-trash'></i>
        </button>` : ``}
    </div>

    <div class="input-group">
      <input type="number" class="gwa" placeholder="Enter GWA">
      <input type="number" class="units" placeholder="Total Units">
    </div>
  `;

  document.getElementById('semesters').appendChild(semDiv);
}


/* REMOVE */
function removeSemester(btn){
  btn.closest('.semester-card').remove();
  renumberSemesters();
}


/* RENUMBER */
function renumberSemesters(){

  const cards = document.querySelectorAll('.semester-card');
  semesterCount = cards.length;

  cards.forEach((card, i) => {
    card.querySelector('.semester-title').innerHTML =
      `<i class='bx bx-calendar'></i> Semester ${i + 1}`;
  });
}


/* CALCULATE */
function calculateGWA(){

  const name = document.getElementById('studentName').value.trim();

  if(!name){
    alert("Enter name");
    return;
  }

  const cards = document.querySelectorAll('.semester-card');

  let totalUnits = 0;
  let totalPoints = 0;

  const tbody = document.querySelector('#semTable tbody');
  tbody.innerHTML = "";

  cards.forEach(card => {

    const g = Number(card.querySelector('.gwa').value);
    const u = Number(card.querySelector('.units').value);

    if(!g || !u) return;

    totalUnits += u;
    totalPoints += g * u;

    let honor = "-";
    if(g <= 1.45) honor = "President's Lister";
    else if(g <= 1.75) honor = "Dean's Lister";

    const tr = document.createElement("tr");
    tr.innerHTML = `<td>${g.toFixed(4)}</td><td>${honor}</td>`;
    tbody.appendChild(tr);
  });

  const cum = totalPoints / totalUnits;

  document.getElementById('displayName').innerText = name;
  document.getElementById('cumulativeGWA').innerText = cum.toFixed(4);

  const badge = document.getElementById('honorBadge');
  badge.className = "honor";

  if(cum <= 1.25) {
    badge.innerText = "Summa Cum Laude";
  } else if(cum <= 1.45) {
    badge.innerText = "Magna Cum Laude";
  } else if(cum <= 1.75) {
    badge.innerText = "Cum Laude";
  } else {
    badge.innerText = "Keep Improving";
  }

  document.getElementById('resultModal').style.display = "flex";
}


/* SAVE */
function saveGraduation(){

  const name = document.getElementById('studentName').value;
  const cumulative = document.getElementById('cumulativeGWA').innerText;
  const honor = document.getElementById('honorBadge').innerText;

  const semesters = [];

  document.querySelectorAll('.semester-card').forEach(card => {
    semesters.push({
      gwa: card.querySelector('.gwa').value,
      units: card.querySelector('.units').value
    });
  });

  saveCalculation("Graduation Calculator", {
    name,
    result: cumulative,
    honor,
    semesters
  });

  alert("Saved!");
}

</script>

<script src="saved.js"></script>

</body>
</html>
